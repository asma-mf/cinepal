# ─────────────────────────────────────────────────────────────────
#  CinePal — Android APK Build
#  Triggered on every push to main (or manually via workflow_dispatch)
#
#  Strategy:
#   • Uses `eas build --local` so the build runs on the GitHub
#     Actions Ubuntu runner for FREE — no EAS cloud credits consumed.
#   • Credentials (Android keystore) are fetched from EAS servers
#     using EXPO_TOKEN — just a lightweight API call, not a build.
#   • The resulting APK is uploaded as a workflow artifact.
# ─────────────────────────────────────────────────────────────────

name: Build Android APK

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60        # Safety net — EAS local builds can take ~30–45 min

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node + pnpm ──────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10          # matches packageManager in package.json
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('mobile/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ── 3. Java (Android build toolchain) ───────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK + NDK ────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.1.12297006" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> $GITHUB_ENV

      # ── 5. EAS CLI (global) ─────────────────────────────────────
      - name: Install EAS CLI
        run: pnpm add --global eas-cli

      # ── 6. Install project dependencies ─────────────────────────
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      # ── 7. Google Services JSON ─────────────────────────────────
      #  The app.config.js reads the GOOGLE_SERVICES_JSON env var as
      #  a *file path*. We write the secret content to a temp file
      #  and point the env var at it.
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON_CONTENT }}' > /tmp/google-services.json
          echo "GOOGLE_SERVICES_JSON=/tmp/google-services.json" >> $GITHUB_ENV

      # ── 8. EAS Local Build ───────────────────────────────────────
      #  --local        → build on THIS runner, not EAS cloud (no credits!)
      #  --non-interactive → CI-safe, no prompts
      #  EXPO_TOKEN     → authenticates with EAS to fetch the Android
      #                   keystore you already registered on EAS
      - name: Build Android APK (EAS local)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICES_JSON: ${{ env.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p build
          eas build \
            --local \
            --platform android \
            --profile production \
            --non-interactive \
            --output ./build/cinepal.apk

      # ── 9. Upload APK as workflow artifact ───────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinepal-android-${{ github.sha }}
          path: mobile/build/cinepal.apk
          retention-days: 30
          if-no-files-found: error

      # ── 10. Release APK to GitHub ────────────────────────────────
      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./mobile/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-build-${{ github.run_number }}
          name: CinePal v${{ steps.get_version.outputs.VERSION }} (Build ${{ github.run_number }})
          files: mobile/build/cinepal.apk
          body: |
            ### 🤖 Automated Android Build
            - **Version:** ${{ steps.get_version.outputs.VERSION }}
            - **Build Number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            
            Download the APK attached below to test the latest changes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
