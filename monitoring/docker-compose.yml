version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    environment:
      # These variables can be overridden when running in production
      - BACKEND_METRICS_URL=${BACKEND_METRICS_URL:-host.docker.internal:5000}
      - FRONTEND_METRICS_URL=${FRONTEND_METRICS_URL:-host.docker.internal:3000}
      - MONGODB_EXPORTER_URL=${MONGODB_EXPORTER_URL:-mongodb-exporter:9216}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51.0
    container_name: mongodb-exporter
    ports:
      - "9216:9216"
    volumes:
      - ./mongodb-exporter-web-config.yml:/etc/mongodb-exporter/web-config.yml
    environment:
      - MONGODB_URI=${MONGODB_URI}
    command:
      - '--mongodb.direct-connect=false'
      - '--web.config.file=/etc/mongodb-exporter/web-config.yml'
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
