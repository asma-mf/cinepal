global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'express-backend'
    scrape_interval: 15s
    static_configs:
      # host.docker.internal maps to localhost on the host machine
      - targets: ['host.docker.internal:8080']

  - job_name: 'nextjs-frontend'
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:3000']

  - job_name: 'mongodb-exporter'
    scrape_interval: 15s
    basic_auth:
      username: 'admin'
      password: 'grafana'
    static_configs:
      - targets: ['mongodb-exporter:9216']
